# Mutation testing configuration.
#
# A test suite that passes tells you the tests ran; it does not tell you they
# would FAIL if the code were wrong. Mutation testing answers the second
# question by breaking the code deliberately and checking the suite notices.
#
# This is here because hand-rolled mutation testing proved unreliable: an
# earlier manual pass reported every mutant killed, when in fact the runner was
# exiting on a missing plugin and never running the suite at all.
#
#   pip install 'mutmut<3'
#   mutmut run                # full run (slow: ~30s per mutant)
#   mutmut run --paths-to-mutate nodes/_recur.py    # the file worth watching
#   mutmut results            # what survived
#   mutmut show <id>          # the surviving diff
#
# A survivor is not automatically a bug -- some mutants are equivalent -- but
# every survivor of a constant this package documents is a test that cannot fail.
[mutmut]
paths_to_mutate = nodes/
tests_dir = nodes/
runner = python3 -m pytest nodes/ -q -x --no-header
